<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水母陪伴 · 桌面端原型</title>
<style>
  :root{
    --deep:#0a1228;
    --deep2:#101d3d;
    --glow:#7fd8e8;
    --glow-soft:#a8e6ef;
    --ink:#dce7f5;
    --ink-dim:#8fa4c4;
    --panel:rgba(18,30,58,.82);
    --line:rgba(127,216,232,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:var(--deep);
    color:var(--ink);
    overflow:hidden;
    user-select:none;
  }

  /* ===== 模拟的电脑桌面 ===== */
  #desktop{
    position:relative;
    width:100%;height:100vh;
    background:
      radial-gradient(900px 600px at 78% 18%, #1a2b52 0%, transparent 60%),
      radial-gradient(700px 500px at 20% 88%, #142244 0%, transparent 55%),
      linear-gradient(160deg,#0c1530 0%,#0a1228 60%,#070d1f 100%);
    transition:filter .8s ease;
  }
  /* 桌面上方的"工作窗口" —— 用来体现水母是常驻在别的内容之上 */
  .work-window{
    position:absolute;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    backdrop-filter:blur(8px);
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  #win-doc{ left:5%; top:9%; width:46%; height:62%; }
  #win-chat{ right:5%; top:14%; width:34%; height:48%; }
  .win-bar{
    height:38px;display:flex;align-items:center;gap:7px;
    padding:0 14px;border-bottom:1px solid var(--line);
  }
  .dot{width:11px;height:11px;border-radius:50%;}
  .dot.r{background:#ff6b6b;}.dot.y{background:#ffd36b;}.dot.g{background:#6bdc97;}
  .win-title{margin-left:10px;font-size:13px;color:var(--ink-dim);}
  .win-body{padding:20px 22px;}
  .line-skel{height:9px;border-radius:5px;background:rgba(143,164,196,.16);margin-bottom:13px;}
  .line-skel.s1{width:88%;}.line-skel.s2{width:72%;}.line-skel.s3{width:94%;}
  .line-skel.s4{width:55%;}.line-skel.s5{width:80%;}
  .chat-bubble{
    max-width:78%;padding:9px 13px;border-radius:13px;font-size:12.5px;
    margin-bottom:11px;line-height:1.5;color:var(--ink-dim);
  }
  .chat-bubble.in{background:rgba(143,164,196,.13);}
  .chat-bubble.out{background:rgba(127,216,232,.15);margin-left:auto;color:var(--glow-soft);}

  /* ===== 水母 ===== */
  #jelly-wrap{
    position:absolute;
    right:60px;
    bottom:-30px;            /* 默认：半个身子探出屏幕边缘 */
    width:200px;height:300px;
    cursor:pointer;
    transition:bottom 1.1s cubic-bezier(.25,.9,.3,1),
               right 1.1s cubic-bezier(.25,.9,.3,1),
               opacity .8s ease, transform .8s ease;
    z-index:50;
  }
  /* 漂浮 + 呼吸 */
  #jelly-float{
    width:100%;height:100%;
    animation:float 6s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(-1.5deg);}
    50%{transform:translateY(-22px) rotate(1.5deg);}
  }

  /* 伞体 */
  .bell{
    position:absolute;left:50%;top:40px;transform:translateX(-50%);
    width:140px;height:120px;
    background:radial-gradient(ellipse at 50% 35%,
      var(--bell-hi,#bdeef5) 0%,
      var(--bell-mid,#7fd8e8) 45%,
      var(--bell-lo,#4a9fc4) 100%);
    border-radius:50% 50% 44% 44%/62% 62% 38% 38%;
    opacity:.92;
    box-shadow:0 0 var(--aura,38px) var(--aura-c,rgba(127,216,232,.55));
    animation:pulse 6s ease-in-out infinite;
    transition:background .9s ease, box-shadow .9s ease;
  }
  @keyframes pulse{
    0%,100%{transform:translateX(-50%) scaleY(1) scaleX(1);}
    50%{transform:translateX(-50%) scaleY(.9) scaleX(1.06);}
  }
  /* 伞体内层纹路 */
  .bell::after{
    content:"";position:absolute;left:50%;top:24px;transform:translateX(-50%);
    width:80px;height:58px;
    border-radius:50%;
    background:radial-gradient(ellipse,rgba(255,255,255,.4),transparent 70%);
  }
  /* 眼睛 */
  .eyes{
    position:absolute;left:50%;top:86px;transform:translateX(-50%);
    display:flex;gap:26px;z-index:3;
  }
  .eye{
    width:11px;height:14px;background:#0a1228;border-radius:50%;
    animation:blink 5.5s infinite;
  }
  @keyframes blink{
    0%,94%,100%{transform:scaleY(1);}
    97%{transform:scaleY(.1);}
  }
  /* 腮红 */
  .cheeks{
    position:absolute;left:50%;top:104px;transform:translateX(-50%);
    display:flex;gap:62px;z-index:2;
  }
  .cheek{width:15px;height:9px;background:rgba(255,150,170,.5);border-radius:50%;}

  /* 触须 */
  .tentacles{
    position:absolute;left:50%;top:150px;transform:translateX(-50%);
    width:130px;height:130px;
  }
  .tent{
    position:absolute;top:0;width:5px;height:110px;
    background:linear-gradient(var(--bell-mid,#7fd8e8),transparent);
    border-radius:3px;
    transform-origin:top center;
    animation:sway 4.5s ease-in-out infinite;
    transition:background .9s ease;
  }
  .tent:nth-child(1){left:14px;animation-delay:0s;height:96px;}
  .tent:nth-child(2){left:38px;animation-delay:.4s;height:118px;}
  .tent:nth-child(3){left:62px;animation-delay:.8s;height:104px;}
  .tent:nth-child(4){left:86px;animation-delay:1.2s;height:120px;}
  .tent:nth-child(5){left:110px;animation-delay:1.6s;height:92px;}
  @keyframes sway{
    0%,100%{transform:rotate(-9deg);}
    50%{transform:rotate(9deg);}
  }

  /* 泡泡文案 */
  #bubble{
    position:absolute;left:-70px;top:8px;
    background:rgba(231,247,250,.95);
    color:#0a2540;
    font-size:13px;
    padding:10px 15px;
    border-radius:15px 15px 15px 4px;
    white-space:nowrap;
    opacity:0;transform:translateY(8px) scale(.9);
    transition:opacity .4s ease, transform .4s ease;
    pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  #bubble.show{opacity:1;transform:translateY(0) scale(1);}

  /* 退下态 */
  #jelly-wrap.dismissed{
    right:-150px;
    opacity:.15;
  }
  /* 全身游出态 */
  #jelly-wrap.out{ bottom:90px; }
  /* 半透明（看视频时的另一种选择） */
  #jelly-wrap.faded{ opacity:.28; }

  /* 状态对应的不同氛围（JS 切 class） */
  .mood-calm   { --bell-hi:#bdeef5;--bell-mid:#7fd8e8;--bell-lo:#4a9fc4;--aura:34px;--aura-c:rgba(127,216,232,.5);}
  .mood-curious{ --bell-hi:#cdf3d8;--bell-mid:#86e0a4;--bell-lo:#4aa86e;--aura:46px;--aura-c:rgba(134,224,164,.6);}
  .mood-focus  { --bell-hi:#fff0c4;--bell-mid:#ffd980;--bell-lo:#d49a3a;--aura:60px;--aura-c:rgba(255,217,128,.7);}
  .mood-sleepy { --bell-hi:#d6d0ee;--bell-mid:#9a8fd0;--bell-lo:#5d5290;--aura:24px;--aura-c:rgba(154,143,208,.4);}
  .mood-happy  { --bell-hi:#ffd6e6;--bell-mid:#ff9ec4;--bell-lo:#d4537e;--aura:70px;--aura-c:rgba(255,158,196,.75);}

  /* 开心时转一圈 */
  #jelly-wrap.spin #jelly-float{ animation:float 6s ease-in-out infinite, spin 1.4s ease-in-out; }
  @keyframes spin{ 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

  /* ===== 控制面板（演示用，真实产品里是系统级设置） ===== */
  #panel{
    position:absolute;left:50%;bottom:22px;transform:translateX(-50%);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 18px;
    backdrop-filter:blur(12px);
    display:flex;flex-direction:column;gap:11px;
    box-shadow:0 16px 40px rgba(0,0,0,.5);
    z-index:80;
    max-width:760px;
  }
  .panel-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .panel-label{font-size:11.5px;color:var(--ink-dim);width:62px;flex-shrink:0;}
  .btn{
    font-family:inherit;font-size:12.5px;
    background:rgba(127,216,232,.1);
    color:var(--glow-soft);
    border:1px solid var(--line);
    padding:6px 13px;border-radius:9px;cursor:pointer;
    transition:all .2s ease;
  }
  .btn:hover{background:rgba(127,216,232,.22);transform:translateY(-1px);}
  .btn.active{background:var(--glow);color:#06121f;border-color:var(--glow);}
  .btn.warn{color:#ffc4c4;}
  .hint{
    font-size:11px;color:var(--ink-dim);text-align:center;
    margin-top:2px;opacity:.8;
  }
  .panel-title{
    font-size:11px;color:var(--glow);letter-spacing:1px;
    text-align:center;margin-bottom:1px;
  }

  /* 专注计时小标 */
  #focus-tag{
    position:absolute;right:60px;top:24px;
    background:rgba(255,217,128,.14);
    border:1px solid rgba(255,217,128,.3);
    color:#ffd980;
    font-size:12px;padding:6px 12px;border-radius:20px;
    opacity:0;transition:opacity .5s ease;
  }
  #focus-tag.show{opacity:1;}
</style>
</head>
<body>
<div id="desktop">

  <!-- 模拟的工作窗口，体现"水母常驻在工作内容之上" -->
  <div class="work-window" id="win-doc">
    <div class="win-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="win-title">季度复盘.doc</span>
    </div>
    <div class="win-body">
      <div class="line-skel s3"></div><div class="line-skel s1"></div>
      <div class="line-skel s2"></div><div class="line-skel s5"></div>
      <div class="line-skel s3"></div><div class="line-skel s4"></div>
      <div class="line-skel s1"></div><div class="line-skel s2"></div>
    </div>
  </div>

  <div class="work-window" id="win-chat">
    <div class="win-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="win-title">团队消息</span>
    </div>
    <div class="win-body">
      <div class="chat-bubble in">这版方案下午能给到吗</div>
      <div class="chat-bubble out">在改了，五点前发你</div>
      <div class="chat-bubble in">辛苦辛苦</div>
    </div>
  </div>

  <!-- 专注计时标 -->
  <div id="focus-tag">专注中 · <span id="focus-time">25:00</span></div>

  <!-- 水母 -->
  <div id="jelly-wrap" class="mood-calm" title="点我">
    <div id="bubble">你回来啦</div>
    <div id="jelly-float">
      <div class="bell"></div>
      <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
      <div class="cheeks"><div class="cheek"></div><div class="cheek"></div></div>
      <div class="tentacles">
        <div class="tent"></div><div class="tent"></div><div class="tent"></div>
        <div class="tent"></div><div class="tent"></div>
      </div>
    </div>
  </div>

  <!-- 演示控制面板 -->
  <div id="panel">
    <div class="panel-title">— 原型演示控制台（真实产品中为系统级设置） —</div>
    <div class="panel-row">
      <span class="panel-label">情绪状态</span>
      <button class="btn active" data-mood="calm">安静</button>
      <button class="btn" data-mood="curious">好奇</button>
      <button class="btn" data-mood="focus">陪伴·专注</button>
      <button class="btn" data-mood="sleepy">困倦</button>
      <button class="btn" data-mood="happy">开心</button>
    </div>
    <div class="panel-row">
      <span class="panel-label">陪伴场景</span>
      <button class="btn" id="btn-focus">▶ 陪我专注</button>
      <button class="btn" id="btn-poke">戳一下它</button>
      <button class="btn" id="btn-back">假装我离开又回来</button>
    </div>
    <div class="panel-row">
      <span class="panel-label">边界控制</span>
      <button class="btn warn" id="btn-dismiss">让它退下（看视频）</button>
      <button class="btn" id="btn-fade">半透明陪伴</button>
      <button class="btn" id="btn-recall">叫它回来</button>
    </div>
    <div class="hint">点击水母本体：探出 / 游出 ｜ 双击水母：吐泡泡说话</div>
  </div>

</div>

<script>
  const wrap   = document.getElementById('jelly-wrap');
  const bubble = document.getElementById('bubble');
  const desktop= document.getElementById('desktop');
  const focusTag = document.getElementById('focus-tag');
  const focusTime= document.getElementById('focus-time');

  const moods = ['calm','curious','focus','sleepy','happy'];

  // 每种状态的泡泡文案库（克制、轻、不鸡汤）
  const lines = {
    calm:   ['我在','嗯，陪着你','慢慢来就好'],
    curious:['你找我吗','怎么啦','我在听'],
    focus:  ['你刚刚很认真','一起加油','我陪你待着'],
    sleepy: ['还没睡呀','早点休息','别太累了'],
    happy:  ['你做到了','今天也辛苦了','见到你真好']
  };

  let outState = false;     // 是否已完全游出
  let focusTimer = null;

  // ---- 切换情绪状态 ----
  function setMood(m){
    moods.forEach(x=>wrap.classList.remove('mood-'+x));
    wrap.classList.add('mood-'+m);
    document.querySelectorAll('[data-mood]').forEach(b=>{
      b.classList.toggle('active', b.dataset.mood===m);
    });
    // 困倦时桌面也变暗一点，开心时亮一点
    desktop.style.filter =
      m==='sleepy' ? 'brightness(.82) saturate(.85)' :
      m==='happy'  ? 'brightness(1.08)' : 'none';
  }
  document.querySelectorAll('[data-mood]').forEach(b=>{
    b.addEventListener('click',()=>setMood(b.dataset.mood));
  });

  // ---- 泡泡说话 ----
  function speak(text){
    bubble.textContent = text;
    bubble.classList.add('show');
    clearTimeout(bubble._t);
    bubble._t = setTimeout(()=>bubble.classList.remove('show'), 2600);
  }
  function speakMood(){
    const m = moods.find(x=>wrap.classList.contains('mood-'+x)) || 'calm';
    const pool = lines[m];
    speak(pool[Math.floor(Math.random()*pool.length)]);
  }

  // ---- 点击水母：探出 / 游出 ----
  let clickT=null;
  wrap.addEventListener('click',(e)=>{
    if(e.target.closest('#panel')) return;
    clearTimeout(clickT);
    clickT = setTimeout(()=>{          // 延迟，给双击让路
      if(!outState){
        wrap.classList.add('out');
        outState = true;
        if(!wrap.classList.contains('mood-focus')
           && !wrap.classList.contains('mood-happy')) setMood('curious');
      }else{
        speakMood();
      }
    },230);
  });
  // 双击：吐泡泡
  wrap.addEventListener('dblclick',(e)=>{
    if(e.target.closest('#panel')) return;
    clearTimeout(clickT);
    speakMood();
  });

  // ---- 陪我专注 ----
  document.getElementById('btn-focus').addEventListener('click',()=>{
    if(focusTimer){ return; }
    wrap.classList.add('out'); outState=true;
    setMood('focus');
    focusTag.classList.add('show');
    speak('好，我陪你');
    let total = 25*60;          // 演示用：加速
    let shown = total;
    focusTimer = setInterval(()=>{
      shown -= 30;              // 每秒走 30 秒，演示更快
      if(shown<=0){
        clearInterval(focusTimer); focusTimer=null;
        focusTag.classList.remove('show');
        setMood('happy');
        wrap.classList.add('spin');
        speak('你专注了 25 分钟，真棒');
        setTimeout(()=>wrap.classList.remove('spin'),1500);
        return;
      }
      const mm=String(Math.floor(shown/60)).padStart(2,'0');
      const ss=String(shown%60).padStart(2,'0');
      focusTime.textContent = mm+':'+ss;
    },1000);
  });

  // ---- 戳一下 ----
  document.getElementById('btn-poke').addEventListener('click',()=>{
    setMood('curious');
    wrap.classList.add('out'); outState=true;
    speak(lines.curious[Math.floor(Math.random()*lines.curious.length)]);
  });

  // ---- 离开又回来 ----
  document.getElementById('btn-back').addEventListener('click',()=>{
    wrap.classList.remove('out'); outState=false;
    bubble.classList.remove('show');
    setTimeout(()=>{
      wrap.classList.add('out'); outState=true;
      setMood('happy');
      wrap.classList.add('spin');
      speak('你回来啦，我还在');
      setTimeout(()=>wrap.classList.remove('spin'),1500);
    },1400);
  });

  // ---- 边界：让它退下 ----
  document.getElementById('btn-dismiss').addEventListener('click',()=>{
    wrap.classList.remove('faded');
    wrap.classList.add('dismissed');
    bubble.classList.remove('show');
  });
  // ---- 边界：半透明陪伴 ----
  document.getElementById('btn-fade').addEventListener('click',()=>{
    wrap.classList.remove('dismissed');
    wrap.classList.add('faded');
  });
  // ---- 叫它回来 ----
  document.getElementById('btn-recall').addEventListener('click',()=>{
    wrap.classList.remove('dismissed','faded');
    setMood('happy');
    wrap.classList.add('out'); outState=true;
    speak('我回来啦');
    wrap.classList.add('spin');
    setTimeout(()=>wrap.classList.remove('spin'),1500);
  });

  // ---- 自动困倦：60 秒无操作 → 进入困倦 ----
  let idle=null;
  function resetIdle(){
    clearTimeout(idle);
    idle=setTimeout(()=>{
      if(!focusTimer) setMood('sleepy');
    },60000);
  }
  ['click','mousemove','keydown'].forEach(ev=>
    document.addEventListener(ev,resetIdle));
  resetIdle();
</script>
</body>
</html>
